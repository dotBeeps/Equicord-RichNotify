name: Release

on:
    push:
        branches:
            - main

env:
    FORCE_COLOR: true

permissions:
    contents: write

jobs:
    release:
        name: Build and release
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v3

            - name: Use Node.js 20
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: |
                  pnpm buildWebStandalone
                  pnpm buildStandalone

            - name: Collect artifacts
              run: |
                  cd dist
                  mkdir release

                  cp browser/browser.* release
                  cp Equicord.user.{js,js.LEGAL.txt} release
                  cp *.{json,zip,asar} release 2>/dev/null || true
                  cp desktop/* release
                  for file in equibop/*; do
                      filename=$(basename "$file")
                      cp "$file" "release/equibop${filename^}"
                  done

                  find release -size 0 -delete
                  rm -f release/package.json release/*.map

            - name: Publish release
              run: |
                  gh release delete latest --yes 2>/dev/null || true
                  gh release create latest dist/release/* \
                      --title "Latest ($(date -u +%Y-%m-%d))" \
                      --notes "Equicord fork with the [RichNotify](https://github.com/${{ github.repository }}/tree/main/src/userplugins/richNotify) plugin. Built from [\`${GITHUB_SHA::7}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})."
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
